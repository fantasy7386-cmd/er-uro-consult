<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTUH Urology ER Consultation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; height: 100vh; display: flex; flex-direction: column; }
.top-bar { background: #fff; border-bottom: 1px solid #d2d2d7; padding: 12px 20px; flex-shrink: 0; }
.top-bar h1 { font-size: 22px; font-weight: 700; }
.top-bar .credit { font-size: 11px; color: #86868b; margin-bottom: 6px; }
.search-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.search-row label { font-size: 15px; font-weight: 600; }
.search-row input { flex: 1; font-size: 15px; padding: 6px 12px; border: 1px solid #d2d2d7; border-radius: 6px; outline: none; }
.search-row input:focus { border-color: #0071e3; box-shadow: 0 0 0 2px rgba(0,113,227,0.2); }
.kw-bar { display: flex; flex-wrap: wrap; gap: 4px; }
.kw-btn { font-size: 12px; padding: 3px 10px; border: 1px solid #d2d2d7; border-radius: 12px; background: #fff; cursor: pointer; transition: all .15s; }
.kw-btn:hover { background: #0071e3; color: #fff; border-color: #0071e3; }
.count { font-size: 12px; color: #86868b; margin-top: 6px; }
.columns { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
.col { display: flex; flex-direction: column; background: #fff; border-radius: 8px; border: 1px solid #d2d2d7; overflow: hidden; }
.col-1 { flex: 2; min-width: 180px; }
.col-2 { flex: 2.5; min-width: 200px; }
.col-3 { flex: 4; min-width: 280px; }
.col-header { font-size: 14px; font-weight: 700; padding: 10px 12px; border-bottom: 1px solid #e5e5ea; background: #fafafa; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.col-header .btns { display: flex; gap: 4px; }
.col-header .btn { font-size: 11px; padding: 3px 8px; border: 1px solid #d2d2d7; border-radius: 4px; background: #fff; cursor: pointer; }
.col-header .btn:hover { background: #0071e3; color: #fff; border-color: #0071e3; }
.col-body { flex: 1; overflow-y: auto; }
.list-item { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 13px; transition: background .1s; }
.list-item:hover { background: #f0f0f5; }
.list-item.selected { background: #0071e3; color: #fff; }
.list-item .desc { font-size: 11px; color: #86868b; margin-top: 2px; }
.list-item.selected .desc { color: rgba(255,255,255,0.7); }
.template-area { padding: 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; font-family: 'SF Mono', 'Consolas', 'Courier New', monospace; flex: 1; overflow-y: auto; }
.template-area .placeholder { color: #86868b; font-family: -apple-system, 'Segoe UI', sans-serif; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px 28px; width: 440px; max-width: 95vw; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.modal h2 { font-size: 20px; margin-bottom: 16px; text-align: center; }
.twist-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.twist-row:last-of-type { border-bottom: none; }
.twist-label { font-size: 14px; }
.twist-options { display: flex; gap: 10px; }
.twist-options label { font-size: 13px; cursor: pointer; }
.twist-options label span { display: block; padding: 4px 12px; border: 1px solid #d2d2d7; border-radius: 6px; transition: all .15s; }
.twist-options input { display: none; }
.twist-options input:checked + span { background: #0071e3; color: #fff; border-color: #0071e3; }
.twist-score { text-align: center; margin-top: 16px; }
.twist-score .number { font-size: 32px; font-weight: 700; }
.twist-score .interp { font-size: 14px; margin-top: 4px; }
.twist-score .interp.low { color: #34c759; }
.twist-score .interp.mid { color: #ff9f0a; }
.twist-score .interp.high { color: #ff3b30; }
.modal-btns { display: flex; justify-content: center; gap: 10px; margin-top: 18px; }
.modal-btn { font-size: 14px; padding: 8px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.modal-btn.primary { background: #0071e3; color: #fff; }
.modal-btn.secondary { background: #e5e5ea; color: #1d1d1f; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1d1d1f; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 200; }
.toast.show { opacity: 1; }
.login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f7; }
.login-box { background: #fff; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.login-box h1 { font-size: 22px; margin-bottom: 4px; }
.login-box .credit { font-size: 11px; color: #86868b; margin-bottom: 20px; }
.login-box input { width: 100%; font-size: 16px; padding: 10px 14px; border: 1px solid #d2d2d7; border-radius: 8px; outline: none; margin-bottom: 12px; text-align: center; }
.login-box input:focus { border-color: #0071e3; }
.login-box button { width: 100%; font-size: 15px; padding: 10px; border: none; border-radius: 8px; background: #0071e3; color: #fff; cursor: pointer; font-weight: 600; }
.login-box .error { color: #ff3b30; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>NTUH Urology ER Consultation</h1>
    <div class="credit">Developed by CY Wu</div>
    <input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Unlock</button>
    <div class="error" id="pwError">Incorrect password. Please try again.</div>
  </div>
</div>

<div id="appScreen" style="display:none; flex-direction:column; height:100vh;">
  <div class="top-bar">
    <h1>NTUH Urology ER Consultation</h1>
    <div class="credit">Developed by CY Wu</div>
    <div class="search-row">
      <label>Search:</label>
      <input type="text" id="searchInput" placeholder="Type keyword (e.g. hematuria, stone, torsion...)">
    </div>
    <div class="kw-bar" id="kwBar"></div>
    <div class="count" id="countLabel"></div>
  </div>
  <div class="columns">
    <div class="col col-1">
      <div class="col-header">1. Diagnosis</div>
      <div class="col-body" id="diagList"></div>
    </div>
    <div class="col col-2">
      <div class="col-header">2. Management</div>
      <div class="col-body" id="pathList"></div>
    </div>
    <div class="col col-3">
      <div class="col-header">
        <span>3. Template</span>
        <div class="btns">
          <button class="btn" id="twistBtn" style="display:none" onclick="openTwist()">TWIST Calc</button>
          <button class="btn" onclick="copyTemplate()">Copy All</button>
        </div>
      </div>
      <div class="template-area" id="templateArea">
        <span class="placeholder">Select a diagnosis, then a management pathway.</span>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="twistModal">
  <div class="modal">
    <h2>TWIST Score Calculator</h2>
    <div id="twistItems"></div>
    <div class="twist-score">
      <div class="number" id="twistNumber">0 / 7</div>
      <div class="interp low" id="twistInterp">Low risk (0-2) &mdash; torsion unlikely</div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="applyTwist()">Apply to Template</button>
      <button class="modal-btn secondary" onclick="closeTwist()">Cancel</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>

async function tryDecrypt(password) {
  const enc = ENCRYPTED_DATA;
  const salt = Uint8Array.from(atob(enc.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(enc.iv), c => c.charCodeAt(0));
  const ct = Uint8Array.from(atob(enc.ct), c => c.charCodeAt(0));

  const keyMaterial = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);

  try {
    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    return new TextDecoder().decode(decrypted);
  } catch(e) { return null; }
}



let KB = null;
let filtered = [];
let currentPaths = [];
let currentPathway = null;
let selectedDiagIdx = -1;
let selectedPathIdx = -1;

const TWIST_ITEMS = [
  { name: "Testicular swelling", points: 2 },
  { name: "Hard testicle", points: 2 },
  { name: "Absent cremasteric reflex", points: 1 },
  { name: "Nausea / vomiting", points: 1 },
  { name: "High riding testis", points: 1 },
];
let twistValues = [0, 0, 0, 0, 0];

const KEYWORDS = ["stone","hematuria","UTI","urosepsis","torsion","epididymitis",
  "retention","hydrocele","trauma","bladder cancer","hernia","nephrostomy",
  "fistula","transplant","prostatitis"];

function initApp(data) {
  KB = data;
  filtered = KB;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "flex";

  const kwBar = document.getElementById("kwBar");
  KEYWORDS.forEach(kw => {
    const btn = document.createElement("button");
    btn.className = "kw-btn";
    btn.textContent = kw;
    btn.onclick = () => { document.getElementById("searchInput").value = kw; onSearch(); };
    kwBar.appendChild(btn);
  });

  const twistDiv = document.getElementById("twistItems");
  TWIST_ITEMS.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "twist-row";
    row.innerHTML = '<span class="twist-label">' + item.name + '</span>' +
      '<div class="twist-options">' +
      '<label><input type="radio" name="tw' + i + '" value="0" checked onchange="calcTwist(' + i + ',0)"><span>No (0)</span></label>' +
      '<label><input type="radio" name="tw' + i + '" value="1" onchange="calcTwist(' + i + ',1)"><span>Yes (+' + item.points + ')</span></label>' +
      '</div>';
    twistDiv.appendChild(row);
  });

  document.getElementById("searchInput").addEventListener("input", onSearch);
  renderDiags();
  updateCount();
}

function onSearch() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!q) { filtered = KB; }
  else {
    const tokens = q.split(/\s+/);
    filtered = KB.filter(cat => {
      const s = (cat.category + " " + cat.keywords.join(" ") + " " +
        cat.pathways.map(p => p.name + " " + p.description + " " + p.template).join(" ")).toLowerCase();
      return tokens.every(t => s.includes(t));
    });
  }
  selectedDiagIdx = -1; selectedPathIdx = -1;
  currentPaths = []; currentPathway = null;
  renderDiags(); renderPaths(); renderTemplate(); updateCount();
}

function updateCount() { document.getElementById("countLabel").textContent = filtered.length + " matching categories"; }

function renderDiags() {
  const el = document.getElementById("diagList"); el.innerHTML = "";
  filtered.forEach((cat, i) => {
    const div = document.createElement("div");
    div.className = "list-item" + (i === selectedDiagIdx ? " selected" : "");
    div.textContent = cat.category;
    div.onclick = () => selectDiag(i);
    el.appendChild(div);
  });
}

function renderPaths() {
  const el = document.getElementById("pathList"); el.innerHTML = "";
  currentPaths.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "list-item" + (i === selectedPathIdx ? " selected" : "");
    div.innerHTML = '<div>' + p.name + '</div><div class="desc">' + p.description + '</div>';
    div.onclick = () => selectPath(i);
    el.appendChild(div);
  });
}

function renderTemplate() {
  const el = document.getElementById("templateArea");
  const btn = document.getElementById("twistBtn");
  if (!currentPathway) {
    el.innerHTML = '<span class="placeholder">Select a diagnosis, then a management pathway.</span>';
    btn.style.display = "none"; return;
  }
  let tmpl = currentPathway.template;
  if (currentPathway.twist_calculator) { tmpl = tmpl.replace("{twist_score}", "0"); btn.style.display = "inline-block"; }
  else { btn.style.display = "none"; }
  el.textContent = tmpl;
}

function selectDiag(i) { selectedDiagIdx = i; selectedPathIdx = -1; currentPathway = null; currentPaths = filtered[i].pathways; renderDiags(); renderPaths(); renderTemplate(); }
function selectPath(i) { selectedPathIdx = i; currentPathway = currentPaths[i]; renderPaths(); renderTemplate(); }

function copyTemplate() {
  const text = document.getElementById("templateArea").textContent;
  if (!text || text.startsWith("Select a")) return;
  navigator.clipboard.writeText(text).then(() => { const t = document.getElementById("toast"); t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 1500); });
}

function openTwist() {
  twistValues = [0,0,0,0,0];
  document.querySelectorAll('#twistItems input[value="0"]').forEach(r => r.checked = true);
  calcTwistDisplay();
  document.getElementById("twistModal").classList.add("show");
}
function closeTwist() { document.getElementById("twistModal").classList.remove("show"); }
function calcTwist(idx, val) { twistValues[idx] = val; calcTwistDisplay(); }
function calcTwistDisplay() {
  let score = 0; twistValues.forEach((v, i) => { score += v * TWIST_ITEMS[i].points; });
  document.getElementById("twistNumber").textContent = score + " / 7";
  const interp = document.getElementById("twistInterp");
  if (score <= 2) { interp.textContent = "Low risk (0-2) \u2014 torsion unlikely"; interp.className = "interp low"; }
  else if (score <= 4) { interp.textContent = "Intermediate risk (3-4) \u2014 ultrasound recommended"; interp.className = "interp mid"; }
  else { interp.textContent = "High risk (5-7) \u2014 emergent exploration"; interp.className = "interp high"; }
}
function applyTwist() {
  let score = 0; twistValues.forEach((v, i) => { score += v * TWIST_ITEMS[i].points; });
  if (currentPathway && currentPathway.twist_calculator) {
    document.getElementById("templateArea").textContent = currentPathway.template.replace("{twist_score}", score.toString());
  }
  closeTwist();
}


async function doLogin() {
  const pw = document.getElementById("pwInput").value;
  const result = await tryDecrypt(pw);
  if (result) {
    const data = JSON.parse(result);
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "flex";
    initApp(data);
  } else {
    document.getElementById("pwError").style.display = "block";
  }
}

document.getElementById("pwInput").focus();
</script>
